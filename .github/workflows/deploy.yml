name: CI-CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t priyanshu72881370/dd-backend:latest ./backend

      - name: Build Frontend Image
        run: docker build -t priyanshu72881370/dd-frontend:latest ./frontend

      - name: Push Docker Images
        run: |
          docker push priyanshu72881370/dd-backend:latest
          docker push priyanshu72881370/dd-frontend:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/mean-app
            sudo docker-compose pull
            sudo docker-compose down
            sudo docker-compose up -d
